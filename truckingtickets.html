<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- This line is what makes the site mobile-friendly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aly Energy — Trucking Ticket</title>

  <style>
    /* ===== BRAND COLORS — change these to re-theme the whole site ===== */
    :root {
      --brand-charcoal: #2b2b2b;   /* matches the ALY logo */
      --brand-accent:   #e2711d;   /* sunset-orange — ties to the rig photo */
      --card:           #ffffff;   /* form card background */
      --text:           #1f1f1f;
      --muted:          #6b7280;
      --border:         #d4d4d8;
      --section:        #f3f4f6;   /* section header strip */
      --ok:             #15803d;
      --err:            #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      line-height: 1.5;
      /* Rig-sunset photo fixed behind everything, with a dark scrim so the
         white form card and text stay readable on top */
      background-image:
        linear-gradient(rgba(26,22,28,0.74), rgba(18,16,22,0.88)),
        url('rig-sunset.jpg');
      background-size: cover, cover;
      background-position: center, center top;
      background-repeat: no-repeat, no-repeat;
      background-attachment: fixed, fixed;
    }

    /* ===== Hero (logo + title over the photo) ===== */
    .hero {
      text-align: center;
      padding: 46px 16px 30px;
    }
    .hero img {
      height: 50px; width: auto;
      filter: invert(1) drop-shadow(0 2px 6px rgba(0,0,0,0.5)); /* dark logo -> white on photo */
    }
    .hero h2 {
      color: #fff;
      margin: 16px 0 0;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }
    .hero .tagline {
      color: rgba(255,255,255,0.85);
      margin: 6px 0 0;
      font-size: 0.85rem;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }

    /* ===== Layout ===== */
    main {
      max-width: 620px;
      margin: 24px auto;
      padding: 0 16px 56px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.45rem; margin: 0 0 2px; }
    .subtitle { color: var(--muted); margin: 0 0 8px; font-size: 0.95rem; }

    /* ===== Section headers ===== */
    .section {
      margin: 26px -24px 4px;
      padding: 10px 24px;
      background: var(--section);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      border-left: 4px solid var(--brand-accent);
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--brand-charcoal);
    }

    label { display: block; font-weight: 600; margin: 14px 0 6px; font-size: 0.92rem; }
    .req { color: var(--brand-accent); }
    .hint { font-weight: 400; color: var(--muted); font-size: 0.82rem; }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      font-size: 16px;            /* 16px stops phones from zooming in on focus */
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--brand-charcoal);
      box-shadow: 0 0 0 3px rgba(43,43,43,0.12);
    }
    textarea { min-height: 88px; resize: vertical; }

    /* two-up rows on wider screens, stacked on phones */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
    @media (max-width: 480px) { .row { grid-template-columns: 1fr; } }

    button {
      width: 100%;
      margin-top: 28px;
      padding: 15px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: var(--brand-accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    #status { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; font-weight: 600; white-space: pre-wrap; }
    #status.show { display: block; }
    #status.ok  { background: #dcfce7; color: var(--ok); }
    #status.err { background: #fee2e2; color: var(--err); }

    footer { text-align: center; color: rgba(255,255,255,0.8); font-size: 0.8rem; margin-top: 22px; text-shadow: 0 1px 6px rgba(0,0,0,0.6); }
  </style>
</head>

<body>
  <header class="hero">
    <img src="aly-logo.png" alt="Aly Energy Services" />
    <h2>Trucking Ticket</h2>
    <p class="tagline">Moving equipment to/from location or between leases</p>
  </header>

  <main>
    <div class="card">
      <p class="subtitle">Please complete the fields below. Required fields are marked <span class="req">*</span></p>

      <form id="aly-form">

        <!-- ===== JOB INFORMATION ===== -->
        <div class="section">Job Information</div>

        <label for="dateOfWork">Date of Work <span class="req">*</span></label>
        <input type="date" id="dateOfWork" name="Date of Work" required />

        <label for="customer">Customer <span class="req">*</span></label>
        <select id="customer" name="Customer" required>
          <option value="">— Select —</option>
          <option>Pioneer</option>
          <option>Triple Crown</option>
          <option>SilverBow</option>
          <option>Ineos</option>
          <option>EOG</option>
          <option>Pioneer/ExxonMobil</option>
          <option>Other</option>
        </select>

        <div class="row">
          <div>
            <label for="lease">Lease <span class="req">*</span></label>
            <input type="text" id="lease" name="Lease" required />
          </div>
          <div>
            <label for="rig">Rig <span class="req">*</span></label>
            <input type="text" id="rig" name="Rig" required />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="jobNumber">Job Number <span class="req">*</span></label>
            <input type="text" id="jobNumber" name="Job Number" required />
          </div>
          <div>
            <label for="countyState">County / State <span class="req">*</span></label>
            <input type="text" id="countyState" name="County / State" required />
          </div>
        </div>

        <label for="base">Base <span class="req">*</span></label>
        <select id="base" name="Base" required>
          <option value="">— Select —</option>
          <option>San Angelo</option>
          <option>Dilley</option>
          <option>Other</option>
        </select>

        <label for="driver">Crew Member / Driver <span class="req">*</span></label>
        <input type="text" id="driver" name="Crew Member / Driver" required />

        <div class="row">
          <div>
            <label for="dateLeftYard">Date Left Yard <span class="req">*</span></label>
            <input type="date" id="dateLeftYard" name="Date Left Yard" required />
          </div>
          <div>
            <label for="dateReturnedYard">Date Returned to Yard <span class="req">*</span></label>
            <input type="date" id="dateReturnedYard" name="Date Returned to Yard" required />
          </div>
        </div>

        <!-- ===== MOVE DETAILS ===== -->
        <div class="section">Move Details</div>

        <label for="moveType">Move Type</label>
        <select id="moveType" name="Move Type">
          <option value="">— Select —</option>
          <option>To Location</option>
          <option>From Location</option>
          <option>Old to New Lease</option>
          <option>Other</option>
        </select>

        <label for="item">Item / Unit # Being Moved / Shipped</label>
        <input type="text" id="item" name="Item / Unit # Being Moved" />

        <div class="row">
          <div>
            <label for="condition">Condition of Equipment</label>
            <select id="condition" name="Condition of Equipment">
              <option value="">— Select —</option>
              <option>Clean</option>
              <option>Dirty</option>
              <option>Damaged</option>
              <option>N/A</option>
              <option>Other</option>
            </select>
          </div>
          <div>
            <label for="thirdParty">3rd Party <span class="hint">(if any)</span></label>
            <input type="text" id="thirdParty" name="3rd Party" />
          </div>
        </div>

        <!-- ===== TIMES ===== -->
        <div class="section">Times</div>

        <div class="row">
          <div>
            <label for="leftYard">Left Yard</label>
            <input type="time" id="leftYard" name="Left Yard" />
          </div>
          <div>
            <label for="arriveLocation">Arrive at Location</label>
            <input type="time" id="arriveLocation" name="Arrive at Location" />
          </div>
        </div>
        <div class="row">
          <div>
            <label for="leaveLocation">Leave Location</label>
            <input type="time" id="leaveLocation" name="Leave Location" />
          </div>
          <div>
            <label for="arriveYard">Arrive at Yard</label>
            <input type="time" id="arriveYard" name="Arrive at Yard" />
          </div>
        </div>

        <!-- ===== TRUCK & MILEAGE ===== -->
        <div class="section">Truck &amp; Mileage</div>

        <label for="vehicleNumber">Vehicle Number</label>
        <input type="text" id="vehicleNumber" name="Vehicle Number" />

        <div class="row">
          <div>
            <label for="beginMileage">Beginning Mileage</label>
            <input type="number" inputmode="numeric" id="beginMileage" name="Beginning Mileage" />
          </div>
          <div>
            <label for="endMileage">Ending Mileage</label>
            <input type="number" inputmode="numeric" id="endMileage" name="Ending Mileage" />
          </div>
        </div>

        <label for="stateLineMileage">Mileage @ State Line (Out) <span class="hint">— only if crossing state line</span></label>
        <input type="number" inputmode="numeric" id="stateLineMileage" name="Mileage @ State Line (Out)" />

        <label for="standByTime">Stand By Time <span class="hint">(optional)</span></label>
        <input type="text" id="standByTime" name="Stand By Time" />

        <!-- ===== NOTES ===== -->
        <div class="section">Notes</div>

        <label for="jobDescription">Job Description <span class="req">*</span></label>
        <textarea id="jobDescription" name="Job Description" required></textarea>

        <label for="locationNotes">Location / Inventory Notes <span class="hint">(optional)</span></label>
        <textarea id="locationNotes" name="Location / Inventory Notes"></textarea>

        <button type="submit" id="submitBtn">Submit Ticket</button>
        <div id="status"></div>
      </form>
    </div>

    <footer>&copy; Aly Energy Services — Trucking Ticket</footer>
  </main>

  <script>
    // ================================================================
    // STEP 4 (later): paste your Power Automate URL between the quotes.
    // Until you do, the form runs in "demo mode" and just shows the
    // data it WOULD send, so you can test the look on your phone.
    // ================================================================
    const FLOW_URL = "https://defaultf56bf9bc4b0248db9c0c7f28495641.f2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/c5b83b1b922340d1b9c1bdb83607f8a0/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=UVdMEdTnO0y0oW4_a_M0XTSca2XgLKbiqZYrh62aab4";

    const form = document.getElementById("aly-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    function showStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = "show " + type;
      statusEl.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      // Gather all field values into a simple object keyed by each field's "name"
      const data = {};
      new FormData(form).forEach((value, key) => { data[key] = value; });
      data["Submitted At"] = new Date().toLocaleString(); // timestamp for the Excel row

      // Demo mode: no URL set yet
      if (!FLOW_URL) {
        showStatus("Demo mode ✓ — this is the data that would be saved:\n\n" + JSON.stringify(data, null, 2), "ok");
        return;
      }

      submitBtn.disabled = true;
      showStatus("Sending…", "ok");

      try {
        // Power Automate supports CORS, so we post real JSON and read the result
        const res = await fetch(FLOW_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error("Server responded " + res.status);
        form.reset();
        showStatus("Thank you! Your trucking ticket was submitted. ✓", "ok");
      } catch (err) {
        showStatus("Sorry, something went wrong. Please try again. (" + err.message + ")", "err");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
